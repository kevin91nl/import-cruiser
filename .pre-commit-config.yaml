---
fail_fast: true
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=200"]
      - id: check-json
      - id: check-toml
      - id: check-ast
      - id: check-merge-conflict
      - id: debug-statements
      - id: detect-private-key
        name: Detect private keys (security)

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff-format
        name: ruff format (src/ and tests/)
        files: ^(src/|tests/)
      - id: ruff
        name: ruff lint (src/ and tests/)
        args: [--fix, --exit-non-zero-on-fix]
        files: ^(src/|tests/)

  - repo: local
    hooks:
      - id: no-docs-dir
        name: No docs/ directory in repo root
        entry: bash -c 'scripts/check_no_docs_dir.sh'
        language: system
        pass_filenames: false
        always_run: true
      - id: no-md-in-src-tests
        name: No .md files in src/ or tests/
        entry: bash -c 'scripts/check_no_md_in_src_tests.sh'
        language: system
        pass_filenames: false
      - id: no-hardcoded-paths
        name: No hardcoded absolute paths or sys.path hacks
        entry: bash -c 'python3 scripts/check_no_hardcoded_paths.py'
        language: system
        pass_filenames: false
      - id: no-raw-sql
        name: No raw SQL outside migrations
        entry: python scripts/check_no_raw_sql.py
        language: python
        pass_filenames: false
        files: ^(src|tests|scripts|examples)/.*\.py$
      - id: check-root-files
        name: Check root directory organization
        entry: python scripts/check_root_files.py
        language: python
        pass_filenames: false
        always_run: true
      - id: check-init-exports
        name: Check __init__.py files export their modules
        entry: python scripts/check_init_exports.py
        language: python
        pass_filenames: false
        files: ^src/.*/__init__\.py$
      - id: check-tests-sync
        name: Check tests match src structure
        entry: python scripts/check_tests_match_src.py
        language: python
        pass_filenames: false
      - id: architecture-boundaries
        name: Architecture boundaries
        entry: python scripts/check_architecture_boundaries.py
        language: python
        pass_filenames: false
        files: ^(src|tests)/.*\.py$
      - id: structural-metrics
        name: Structural metrics (LCOM/DIT/fan-in/out/indirection)
        entry: python scripts/check_structural_metrics.py
        language: python
        pass_filenames: false
        files: ^src/.*\.py$
      - id: code-budgets
        name: Code budgets (file/function LOC + complexity)
        entry: python scripts/check_code_budgets.py
        language: python
        pass_filenames: false
        files: ^src/.*\.py$
      - id: no-untyped-collections
        name: No Any or untyped collections
        entry: python scripts/check_no_untyped_collections.py
        language: python
        pass_filenames: false
        always_run: true
      - id: refresh-self-graph
        name: Refresh self-graph artifacts
        entry: make self-graph
        language: system
        pass_filenames: false
        always_run: true
      - id: unit-tests-targeted
        name: Targeted unit tests (fast)
        entry: python scripts/run_targeted_unit_tests.py
        language: python
        additional_dependencies: ["click", "pytest", "pytest-cov"]
        pass_filenames: false
      - id: import-cruiser-architecture
        name: import-cruiser architecture validation
        entry: bash -c 'PYTHONPATH=src python3 -m import_cruiser.cli validate src --config import-cruiser.json --strict --output-format pylint'
        language: system
        pass_filenames: false
        always_run: true

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.2
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml", "-r", "src/"]
        additional_dependencies: ["bandit[toml]"]
        files: ^src/
        pass_filenames: false

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        additional_dependencies:
          - types-click
        files: ^src/.*\.py$

  - repo: local
    hooks:
      - id: pyright
        name: Pyright (src/)
        entry: pyright src
        language: python
        additional_dependencies: ["pyright"]
        pass_filenames: false
        files: ^src/.*\.py$
      - id: pylint
        name: Pylint (src/ and tests/)
        entry: pylint src/ tests/ --output-format=text
        language: python
        additional_dependencies: ["pylint>=3.0.0,<5"]
        pass_filenames: false
        files: ^(src/|tests/).*\.py$
      - id: xenon
        name: Xenon (src/)
        entry: xenon --max-absolute D --max-modules D --max-average C src
        language: python
        additional_dependencies: ["xenon>=0.9.1"]
        pass_filenames: false
        files: ^src/.*\.py$
      - id: vulture
        name: Vulture (detect dead code)
        entry: vulture src/ scripts/vulture_whitelist.py --min-confidence 80
        language: python
        additional_dependencies: ["vulture"]
        pass_filenames: false
        files: ^src/
      - id: import-linter
        name: Import Linter (architecture)
        entry: python -m importlinter.cli
        language: python
        additional_dependencies: ["import-linter>=1.13.0"]
        pass_filenames: false
        files: ^src/.*\.py$

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  - repo: https://github.com/econchick/interrogate
    rev: 1.7.0
    hooks:
      - id: interrogate
        args: ["--verbose", "--fail-under=0", "--ignore-init-method", "--ignore-init-module", "src", "tests"]
        pass_filenames: false
