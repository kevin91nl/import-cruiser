---
fail_fast: true
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=200']
      - id: check-json
      - id: check-toml
      - id: check-ast
      - id: check-merge-conflict
      - id: debug-statements
      - id: detect-private-key
        name: Detect private keys (security)

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff-format
        name: ruff format (src/ and tests/)
        files: ^(src/|tests/)
      - id: ruff
        name: ruff lint (src/ and tests/)
        args: [--fix, --exit-non-zero-on-fix]
        files: ^(src/|tests/)

  - repo: local
    hooks:
      - id: no-docs-dir
        name: No docs/ directory in repo root
        entry: bash -c 'scripts/check_no_docs_dir.sh'
        language: system
        pass_filenames: false
        always_run: true
      - id: no-md-in-src-tests
        name: No .md files in src/ or tests/
        entry: bash -c 'scripts/check_no_md_in_src_tests.sh'
        language: system
        pass_filenames: false
      - id: no-hardcoded-paths
        name: No hardcoded absolute paths or sys.path hacks
        entry: bash -c 'python3 scripts/check_no_hardcoded_paths.py'
        language: system
        pass_filenames: false

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.2
    hooks:
      - id: bandit
        args: ['-c', 'pyproject.toml', '-r', 'src/']
        additional_dependencies: ['bandit[toml]']
        files: ^src/
        pass_filenames: false

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        additional_dependencies:
          - types-click
        files: ^src/.*\.py$
